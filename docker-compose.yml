services:

  # ─────────────────────────────────────────
  # ZOOKEEPER
  # ─────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - order-network

  # ─────────────────────────────────────────
  # KAFKA
  # ─────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - order-network

  # ─────────────────────────────────────────
  # REDPANDA CONSOLE (Kafka UI)
  # ─────────────────────────────────────────
  redpanda-console:
    image: redpandadata/console:v2.4.3
    container_name: redpanda-console
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8090:8080"
    environment:
      CONFIG_FILEPATH: /etc/redpanda/config.yaml
    volumes:
      - ./redpanda-config.yaml:/etc/redpanda/config.yaml:ro
    networks:
      - order-network

  # ─────────────────────────────────────────
  # ORACLE XE 21c
  # ─────────────────────────────────────────
  oracle:
    image: gvenzl/oracle-xe:21-slim
    container_name: oracle-xe
    ports:
      - "1521:1521"
      - "5500:5500"    # Oracle EM Express (optional)
    environment:
      ORACLE_PASSWORD: ${ORACLE_SYS_PASSWORD}
      APP_USER: ${ORACLE_USER}
      APP_USER_PASSWORD: ${ORACLE_PASSWORD}
    volumes:
      - oracle-data:/opt/oracle/oradata
    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s
    networks:
      - order-network

  # ─────────────────────────────────────────
  # SERVICE REGISTRY (Eureka)
  # ─────────────────────────────────────────
  service-registry:
    build:
      context: ./service-registry/service-registry
      dockerfile: ../../Dockerfile.spring
    container_name: service-registry
    ports:
      - "8761:8761"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8761/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 30s
    networks:
      - order-network

  # ─────────────────────────────────────────
  # API GATEWAY
  # ─────────────────────────────────────────
  api-gateway:
    build:
      context: ./api-gateway/api-gateway
      dockerfile: ../../Dockerfile.spring
    container_name: api-gateway
    ports:
      - "8080:8080"
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://service-registry:8761/eureka
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION}
    depends_on:
      service-registry:
        condition: service_healthy
    networks:
      - order-network

  # ─────────────────────────────────────────
  # ORDER SERVICE
  # ─────────────────────────────────────────
  order-service:
    build:
      context: ./order-service/order-service
      dockerfile: ../../Dockerfile.spring
    container_name: order-service
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:oracle:thin:@oracle-xe:1521/XEPDB1
      SPRING_DATASOURCE_USERNAME: ${ORDER_DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${ORDER_DB_PASSWORD}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://service-registry:8761/eureka
    depends_on:
      oracle:
        condition: service_healthy
      kafka:
        condition: service_healthy
      service-registry:
        condition: service_healthy
    networks:
      - order-network

  # ─────────────────────────────────────────
  # INVENTORY SERVICE
  # ─────────────────────────────────────────
  inventory-service:
    build:
      context: ./inventory-service/inventory-service
      dockerfile: ../../Dockerfile.spring
    container_name: inventory-service
    ports:
      - "8082:8082"
    environment:
      SPRING_DATASOURCE_URL: jdbc:oracle:thin:@oracle-xe:1521/XEPDB1
      SPRING_DATASOURCE_USERNAME: ${INVENTORY_DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${INVENTORY_DB_PASSWORD}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://service-registry:8761/eureka
    depends_on:
      oracle:
        condition: service_healthy
      kafka:
        condition: service_healthy
      service-registry:
        condition: service_healthy
    networks:
      - order-network

  # ─────────────────────────────────────────
  # PAYMENT SERVICE
  # ─────────────────────────────────────────
  payment-service:
    build:
      context: ./payment-service/payment-service
      dockerfile: ../../Dockerfile.spring
    container_name: payment-service
    ports:
      - "8083:8083"
    environment:
      SPRING_DATASOURCE_URL: jdbc:oracle:thin:@oracle-xe:1521/XEPDB1
      SPRING_DATASOURCE_USERNAME: ${PAYMENT_DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${PAYMENT_DB_PASSWORD}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://service-registry:8761/eureka
    depends_on:
      oracle:
        condition: service_healthy
      kafka:
        condition: service_healthy
      service-registry:
        condition: service_healthy
    networks:
      - order-network

  # ─────────────────────────────────────────
  # SHIPPING SERVICE
  # ─────────────────────────────────────────
  shipping-service:
    build:
      context: ./shipping-service/shipping-service
      dockerfile: ../../Dockerfile.spring
    container_name: shipping-service
    ports:
      - "8084:8084"
    environment:
      SPRING_DATASOURCE_URL: jdbc:oracle:thin:@oracle-xe:1521/XEPDB1
      SPRING_DATASOURCE_USERNAME: ${SHIPPING_DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${SHIPPING_DB_PASSWORD}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://service-registry:8761/eureka
    depends_on:
      oracle:
        condition: service_healthy
      kafka:
        condition: service_healthy
      service-registry:
        condition: service_healthy
    networks:
      - order-network

  # ─────────────────────────────────────────
  # NOTIFICATION SERVICE
  # ─────────────────────────────────────────
  notification-service:
    build:
      context: ./notification-service/notification-service
      dockerfile: ../../Dockerfile.spring
    container_name: notification-service
    ports:
      - "8085:8085"
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://service-registry:8761/eureka
    depends_on:
      kafka:
        condition: service_healthy
      service-registry:
        condition: service_healthy
    networks:
      - order-network

  # ─────────────────────────────────────────
  # DUMMY SERVICE
  # ─────────────────────────────────────────
  dummy-service:
    build:
      context: ./dummy-service/dummy-service
      dockerfile: ../../Dockerfile.spring
    container_name: dummy-service
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://service-registry:8761/eureka
    depends_on:
      service-registry:
        condition: service_healthy
    networks:
      - order-network

networks:
  order-network:
    driver: bridge

volumes:
  oracle-data: