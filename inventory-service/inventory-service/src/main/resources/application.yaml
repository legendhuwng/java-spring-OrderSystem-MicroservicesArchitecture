server:
  port: 8082

spring:
  application:
    name: inventory-service

  datasource:
    url: jdbc:oracle:thin:@localhost:1521/XEPDB1
    username: inventoryuser
    password: inventorypass123
    driver-class-name: oracle.jdbc.OracleDriver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.OracleDialect
        format_sql: true

  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
    consumer:
      group-id: inventory-service-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

kafka:
  topics:
    order-created: order-created
    inventory-reserved: inventory-reserved
    inventory-failed: inventory-failed
    inventory-release-command: inventory-release-command  # thêm dòng này

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] [correlationId=%X{correlationId}] %-5level %logger{36} - %msg%n"